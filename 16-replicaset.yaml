apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  ## this labels are replicaset labels
  labels: 
    project: roboshop
    purpose: rs-demo
    tier: frontend
    component: frontend
spec:
  replicas: 3
  selector:
    # using these labels replica set selects the pod
    matchLabels:
      project: roboshop
      purpose: rs-demo
      tier: frontend
      component: frontend
  ## this pod defination, pod is subnet of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        purpose: rs-demo
        tier: frontend
        component: frontend
    sepc:
      containers:
      - name: nginx
        image: nginx